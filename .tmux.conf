#--- BINDS ---#
# Prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Splits 
bind '\' split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window/session
bind c new-window -c "#{pane_current_path}"
bind C new-session

# Rename: lowercase = window (most frequent), capital = session
bind r command-prompt "rename-window '%%'"
bind R command-prompt "rename-session '%%'"

# Add repeatability to next/previous window
bind -r n next-window
bind -r p previous-window

# Fuzzy session switcher: pinned first, then by creation order
set -g @switcher-pinned 'workbench|config-claude|config-pi|config-tmux|pr-reviews'
unbind s
bind s display-popup -E -w 40% -h 40% "exec $HOME/.local/bin/tmux-session-picker"
bind C-p choose-tree -Zs

# Reload config (moved off r since rename took it)
bind C-r source-file ~/.tmux.conf \; display-message "config reloaded"

#--- SETTINGS ---#
# Use vi style keys for copy mode
set -g mode-keys vi

# Keep manual names from being clobbered
set -g allow-rename off
set -g automatic-rename off

# When a session is killed, jump to another one instead of closing tmux
set -g detach-on-destroy off

# Status line customization
set -g status-style "bg=#b48ead,fg=black"
set -g status-left-length 30
set -g status-left "#{?client_prefix,#[fg=##b48ead]#[bg=black]#[bold]✦,#[fg=black]#[bg=##b48ead] }#[default] #S >>> "
set -g window-status-format " [#I] #W#{?window_zoomed_flag,⤢  ,} "
set -g window-status-current-format "#[fg=##b48ead,bg=black,bold] [#I] #W#{?window_zoomed_flag,⤢  ,} #[default]"
set -g window-status-separator "|"

# Make windows 1-indexed instead of 0
set -g base-index 1
set -g pane-base-index 1

# Mouse
set -g mouse on
bind -T copy-mode WheelUpPane select-pane \; send-keys -X -N 2 scroll-up
bind -T copy-mode WheelDownPane select-pane \; send-keys -X -N 2 scroll-down
bind -T copy-mode-vi WheelUpPane select-pane \; send-keys -X -N 2 scroll-up
bind -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 2 scroll-down

# Style panes for clarity
set -g pane-border-status top
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=#b48ead,bold"
set -g pane-border-format "#{?pane_active,#[fg=##b48ead]#[bg=black]#[bold],#[fg=colour238]} #{pane_index}: #{pane_title} #[default]"

# Prompt rename on new windows
bind c new-window -c "#{pane_current_path}" \; command-prompt -I "" "rename-window '%%'"
bind C new-session \; command-prompt -I "" "rename-session '%%'" \; command-prompt -I "" "rename-window '%%'"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'timvw/tmux-assistant-resurrect'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-copycat'

# tmux-copycat
set -g @copycat_search_C-u 'https://[[:alnum:]?=%/_.:,;~@!#$&()*+-]*'

# tmux-resurrect
set -g @resurrect-save 'M-s'
set -g @resurrect-restore 'M-r'
set -g @resurrect-capture-pane-contents 'on'

# tmux-continuum
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# Keep this last
run '~/.tmux/plugins/tpm/tpm'
