###################
#--- TERMINAL ---#
###################

# Let apps opt into extended keys without forcing CSI-u into shells
set -s extended-keys on
set -g terminal-features[3] 'xterm*:extkeys'

###############
#--- BINDS ---#
###############

# Rebind prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Rebind splits/panes
bind '\' split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Rebind window/session; start from empty text rather than replacing existing text
bind r command-prompt "rename-window '%%'"
bind R command-prompt "rename-session '%%'"

# Add repeatability to next/previous window so you can keep scrolling through them without hitting prefix each time
bind -r n next-window
bind -r p previous-window

# Move the current window left/right without prefix
bind -n C-S-Left swap-window -t -1 \; select-window -t -1
bind -n C-S-Right swap-window -t +1 \; select-window -t +1

# e for a scratch ephemeral terminal popup, always closes on exit (even after a nonzero exit status)
bind e display-popup -E -E -d "#{pane_current_path}" -w 50% -h 75%

# s for session via rolomux, S for session via default picker in case rolomux breaks
bind s display-popup -E -B -w 84 -h 60% "exec /opt/homebrew/bin/rolomux"
bind S choose-tree -Zs

# i for boomerang in the current pane path, without leaking GITHUB_TOKEN
bind i display-popup -E -B -d "#{pane_current_path}" -w 84 -h 60% "exec env -u GITHUB_TOKEN /opt/homebrew/bin/boomerang"

# Hot reload tmux config
bind C-r source-file ~/.tmux.conf \; display-message "config reloaded"

# Force naming new sessions/windows at creation time to stay organized
bind c new-window -c "#{pane_current_path}" \; command-prompt -I "" "rename-window '%%'"
bind C new-session \; command-prompt -I "" "rename-session '%%'" \; command-prompt -I "" "rename-window '%%'"

###########################
#--- WINDOW MANAGEMENT ---#
###########################

# Keep manual names from being clobbered
set -g allow-rename off
set -g automatic-rename off

# When a window is closed, renumber all remaining windows
set-option -g renumber-windows on

# When a session is killed, jump to another one instead of closing tmux
set -g detach-on-destroy off

# Make windows 1-indexed instead of 0
set -g base-index 1
set -g pane-base-index 1


#################
#--- STYLING ---#
#################

# Customize status line
set -g status-style "bg=#b48ead,fg=black"
set -g status-left-length 30
set -g status-left "#{?client_prefix,#[fg=##b48ead]#[bg=black]#[bold]✦,#[fg=black]#[bg=##b48ead] }#[default] #S >>> "
set -g window-status-format " [#I] #W#{?window_zoomed_flag,⤢  ,} "
set -g window-status-current-format "#[fg=##b48ead,bg=black,bold] [#I] #W#{?window_zoomed_flag,⤢  ,} #[default]"
set -g window-status-separator "|"

# Add styled borders to splits/panes and make the active pane more obvious
set -g pane-border-status top
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=#b48ead,bold"
set -g pane-border-format "#{?pane_active,#[fg=##b48ead]#[bg=black]#[bold],#[fg=colour238]} #{pane_index}: #{pane_title} #[default]"


###################
#--- COPY MODE ---#
###################

# Use vi style keys for copy mode
set -g mode-keys vi

# Enable mouse + scrolling (sorry Andrew)
set -g mouse on

# Stop mouse events on the status bar from switching windows
unbind -n MouseDown1Status
unbind -n WheelUpStatus
unbind -n WheelDownStatus

bind -T copy-mode WheelUpPane select-pane \; send-keys -X -N 2 scroll-up
bind -T copy-mode WheelDownPane select-pane \; send-keys -X -N 1 scroll-down
bind -T copy-mode-vi WheelUpPane select-pane \; send-keys -X -N 2 scroll-up
bind -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 1 scroll-down


#################
#--- PLUGINS ---#
#################

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'timvw/tmux-assistant-resurrect'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-copycat'

# tmux-copycat
unbind -q C-u
set -gu @copycat_search_C-u
set -g @copycat_url_search 'u'
set -g @copycat_search_u 'https://[[:alnum:]]([[:alnum:]?=%/_.:,;~@!#$&()*+-]*[[:alnum:]/#=_~-])?'

# tmux-resurrect
set -g @resurrect-save 'M-s'
set -g @resurrect-restore 'M-r'
set -g @resurrect-capture-pane-contents 'on'

# tmux-continuum
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# Keep this last
run '~/.tmux/plugins/tpm/tpm'

# Override TPM's default prefix+I after TPM installs its binding.
bind I display-popup -E -B -d "#{pane_current_path}" -w 84 -h 60% "exec env -u GITHUB_TOKEN /opt/homebrew/bin/boomerang --capture"
